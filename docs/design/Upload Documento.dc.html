<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Manrope',system-ui,sans-serif;background:#EFE9E1;color:#2B2622;-webkit-font-smoothing:antialiased}
  .ms{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;direction:ltr;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;user-select:none}
</style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px">
  <div style="width:540px;max-width:100%;background:#fff;border-radius:20px;box-shadow:0 30px 70px rgba(43,38,34,.22);overflow:hidden">

    <div style="display:flex;align-items:center;gap:13px;padding:22px 24px 16px;border-bottom:1px solid #F3ECE4">
      <div style="width:44px;height:44px;flex:none;border-radius:12px;background:#FBEDE4;display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:24px;color:#C4622D">upload_file</span></div>
      <div style="flex:1;min-width:0">
        <h2 style="margin:0;font-size:18px;font-weight:800;letter-spacing:-.4px">Nuovo documento</h2>
        <div style="font-size:12.5px;color:#A79C90;font-weight:600;margin-top:2px">Aggiungi un file all'archivio della Famiglia Rossi</div>
      </div>
      <button style="width:36px;height:36px;flex:none;border:1px solid #ECE4DA;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="ms" style="font-size:20px;color:#8A7F73">close</span></button>
    </div>

    <div style="padding:20px 24px;display:flex;flex-direction:column;gap:18px">
      <div style="border:2px dashed #E2D6C7;border-radius:16px;background:#FBF7F1;padding:30px 20px;display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;cursor:pointer">
        <div style="width:52px;height:52px;border-radius:14px;background:#fff;border:1px solid #ECE4DA;display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:26px;color:#C4622D">cloud_upload</span></div>
        <div style="font-size:14px;font-weight:700;color:#2B2622">Trascina qui il file <span style="color:#C4622D">o sfoglia</span></div>
        <div style="font-size:12px;color:#A79C90;font-weight:600">PDF, JPG o PNG · massimo 20 MB</div>
      </div>

      <div>
        <label style="display:block;font-size:12.5px;font-weight:700;color:#6E655B;margin-bottom:7px">Nome documento</label>
        <input placeholder="es. Referto visita cardiologica" style="width:100%;height:44px;border:1px solid #ECE4DA;border-radius:11px;padding:0 14px;font-family:inherit;font-size:14px;color:#2B2622;outline:0;background:#fff">
      </div>

      <div>
        <label style="display:block;font-size:12.5px;font-weight:700;color:#6E655B;margin-bottom:9px">Categoria</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <sc-for list="{{ cats }}" as="c" hint-placeholder-count="5">
            <button onClick="{{ c.set }}" style="display:inline-flex;align-items:center;gap:7px;border:1px solid {{ c.bd }};background:{{ c.bg }};color:{{ c.fg }};font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:11px;cursor:pointer"><span class="ms" style="font-size:17px">{{ c.icon }}</span>{{ c.label }}</button>
          </sc-for>
        </div>
      </div>

      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:150px">
          <label style="display:block;font-size:12.5px;font-weight:700;color:#6E655B;margin-bottom:7px">Data di scadenza <span style="color:#B5AA9E;font-weight:600">(facoltativa)</span></label>
          <input type="date" style="width:100%;height:44px;border:1px solid #ECE4DA;border-radius:11px;padding:0 14px;font-family:inherit;font-size:14px;color:#2B2622;outline:0;background:#fff">
        </div>
        <div style="flex:1;min-width:150px">
          <label style="display:block;font-size:12.5px;font-weight:700;color:#6E655B;margin-bottom:7px">Visibilità</label>
          <div style="display:flex;background:#F3ECE4;border-radius:11px;padding:4px;gap:4px">
            <sc-for list="{{ vis }}" as="o" hint-placeholder-count="2">
              <button onClick="{{ o.set }}" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;border:0;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;background:{{ o.bg }};color:{{ o.fg }};box-shadow:{{ o.shadow }}"><span class="ms" style="font-size:16px">{{ o.icon }}</span>{{ o.label }}</button>
            </sc-for>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:10px;padding:16px 24px 22px;border-top:1px solid #F3ECE4">
      <button style="height:44px;padding:0 20px;border:1px solid #ECE4DA;background:#fff;color:#6E655B;font-family:inherit;font-size:13.5px;font-weight:700;border-radius:11px;cursor:pointer">Annulla</button>
      <button style="display:inline-flex;align-items:center;gap:8px;height:44px;padding:0 20px;border:0;background:#C4622D;color:#fff;font-family:inherit;font-size:13.5px;font-weight:700;border-radius:11px;cursor:pointer;box-shadow:0 4px 12px rgba(196,98,45,.26)"><span class="ms" style="font-size:20px">check</span>Carica documento</button>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { cat: 'medico', share: 'condiviso' };
  renderVals() {
    const cat = {
      medico:  { icon: 'medical_services', label: 'Medico' },
      casa:    { icon: 'home',             label: 'Casa' },
      auto:    { icon: 'directions_car',   label: 'Auto' },
      finanze: { icon: 'account_balance',  label: 'Finanze' },
      doc:     { icon: 'badge',            label: 'Documenti' },
    };
    return {
      cats: Object.keys(cat).map(k => {
        const on = this.state.cat === k;
        return { icon: cat[k].icon, label: cat[k].label, set: (e) => { e.preventDefault(); this.setState({ cat: k }); },
          bg: on ? '#FBEDE4' : '#fff', bd: on ? '#EAD3C0' : '#ECE4DA', fg: on ? '#C4622D' : '#8A7F73' };
      }),
      vis: [
        { key: 'privato',   label: 'Privato',   icon: 'lock' },
        { key: 'condiviso', label: 'Condiviso', icon: 'group' },
      ].map(o => {
        const on = this.state.share === o.key;
        return { label: o.label, icon: o.icon, set: (e) => { e.preventDefault(); this.setState({ share: o.key }); },
          bg: on ? '#fff' : 'transparent', fg: on ? '#C4622D' : '#8A7F73', shadow: on ? '0 1px 3px rgba(43,38,34,.12)' : 'none' };
      }),
    };
  }
}
</script>
</body>
</html>
