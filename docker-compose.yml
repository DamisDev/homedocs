services:

  # ─────────────────────────────
  # Frontend — Vue.js 3 + Vite
  # ─────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: homedocs-frontend
    # npm install all'avvio: allinea node_modules del container quando
    # cambiano le dipendenze senza dover ricostruire l'immagine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - ./packages:/packages:ro
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

  # ─────────────────────────────
  # Backend core — NestJS
  # ─────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: homedocs-backend
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
      - ./packages:/packages:ro
      - /app/node_modules
    # Secrets (JWT_SECRET, JWT_REFRESH_SECRET, MINIO_ACCESS_KEY/SECRET_KEY,
    # MONGODB_URI, MINIO_ENDPOINT/PORT/BUCKET) arrivano da .env: mai in
    # chiaro qui. In produzione rigenerare i segreti in .env, non nel compose.
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      # non-secret, specifico dell'hostname interno Docker: resta qui
      - OCR_SERVICE_URL=http://ocr-service:8000
    depends_on:
      - mongo
      - minio
      - ocr-service

  # ─────────────────────────────
  # Servizio OCR/AI — Python + FastAPI
  # ─────────────────────────────
  ocr-service:
    build:
      context: ./apps/ocr-service
      dockerfile: Dockerfile.dev
    container_name: homedocs-ocr-service
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ocr-service:/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env

  # ─────────────────────────────
  # Mail — Mailpit (SMTP di sviluppo con UI su :8025)
  # ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: homedocs-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web + API

  # ─────────────────────────────
  # Database — MongoDB
  # ─────────────────────────────
  mongo:
    image: mongo:7
    container_name: homedocs-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ─────────────────────────────
  # Storage file — MinIO (S3-compatible)
  # ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: homedocs-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    # ${VAR}: sostituzione letta dal .env in root da parte del CLI di
    # Docker Compose stesso (diverso da env_file, che vale per il container).
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data

volumes:
  mongo-data:
  minio-data:
