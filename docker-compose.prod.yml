# Stack di produzione: immagini buildate (multi-stage), nessun bind-mount del
# sorgente, nessun "npm install" all'avvio. Uso: docker compose -f
# docker-compose.prod.yml up --build
#
# File indipendente da docker-compose.yml (dev): volumi con nome diverso per
# non condividere/sporcare i dati dello stack di sviluppo. `image:` esplicito
# e distinto da quello dev (altrimenti Compose userebbe lo stesso tag
# "homedocs-<servizio>" per entrambi i file, e l'ultimo build vince — chi
# passa da uno stack all'altro deve ricordarsi `--build` anche sul dev).
#
# Caddy termina TLS (Let's Encrypt automatico) ed è l'unico servizio con
# porte esposte pubblicamente (80/443). Mongo e MinIO non hanno più porte
# pubblicate: raggiungibili solo sulla rete Docker interna dai servizi che
# ne hanno bisogno. `restart: unless-stopped` fa ripartire tutto da solo
# quando la VM si riavvia (es. dopo lo start automatico mattutino).

services:
  caddy:
    image: caddy:2-alpine
    container_name: homedocs-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data-prod:/data
      - caddy-config-prod:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: homedocs-frontend-prod
    container_name: homedocs-frontend
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: homedocs-backend-prod
    container_name: homedocs-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OCR_SERVICE_URL=http://ocr-service:8000
    depends_on:
      - mongo
      - minio
      - ocr-service

  ocr-service:
    build:
      context: apps/ocr-service
      dockerfile: Dockerfile
    image: homedocs-ocr-service-prod
    container_name: homedocs-ocr-service
    restart: unless-stopped
    env_file:
      - .env

  mongo:
    image: mongo:7
    container_name: homedocs-mongo
    restart: unless-stopped
    volumes:
      - mongo-data-prod:/data/db

  minio:
    image: minio/minio:latest
    container_name: homedocs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data-prod:/data

volumes:
  mongo-data-prod:
  minio-data-prod:
  caddy-data-prod:
  caddy-config-prod:
